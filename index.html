<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",

<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { io } from "socket.io-client";

/* ============================================================
   DataSource interface (locked seam — CLAUDE.md decision 5)
   getSnapshot(): Promise<{tokens: [{word, price, volume24h}]}>
   subscribe(cb): live events {type:'buy'|'sell'|'tip', word, amount, ts} -> unsubscribe fn
   getReplay(days): Promise<event[]>
   ============================================================ */

function buildVocabulary(count) {
  const A = ["MOON","APE","DEGEN","HODL","PEPE","WAGMI","GM","CHAD","BASED","ANON","FREN","NGMI","REKT","FOMO",
    "DYOR","LAMBO","DIAMOND","PAPER","BULL","BEAR","WHALE","SHRIMP","NODE","MESH","PULSE","CHAIN","BLOCK","TOKEN",
    "COIN","VAULT","FORGE","NOVA","ECHO","FLUX","ORBIT","ZENITH","CIPHER","QUANTUM","NEON","PIXEL","GLITCH",
    "SIGNAL","BEACON","RELAY","SPARK","EMBER","FROST","STORM","TIDE","DUNE","CORAL","ONYX","JADE","IVORY","CORE",
    "EDGE","PEAK","VOID","RIFT","WAVE","GRIT","HALO","EPOCH","DRIFT","FABLE","OMEN","RUNE","SIGIL","TEMPO"];
  const B = ["AE","SUPERHERO","TRENDMINER","DAO","FI","SWAP","VERSE","LAND","WORLD","NET","LINK","HUB","LAB",
    "ZONE","GRID","FIELD","SPACE","PORT","GATE","CHAIN"];
  const words = new Set();
  for (const a of A) words.add(a);
  let bi = 0;
  outer: while (words.size < count) {
    for (const a of A) {
      const b = B[bi % B.length];
      words.add(`${a}${b}`);
      if (words.size >= count) break outer;
    }
    bi++;
    if (bi > B.length * 4) break;
  }
  return Array.from(words).slice(0, count);
}

const FULL_VOCAB = buildVocabulary(320);
const NODE_COUNT = 220;
// Fix 2 (cosmetic label declutter): max labels shown at rest, by vol24h —
// plus the hovered/selected node if it isn't already in that set.
const LABEL_TOP_K = 20;

function poissonDelay(meanMs) {
  return -Math.log(1 - Math.random()) * meanMs;
}

class MockSource {
  constructor(words) {
    this.words = words;
    this.state = new Map();
    for (const w of this.words) {
      this.state.set(w, {
        word: w,
        price: 0.002 + Math.random() * Math.random() * 4,
        volume24h: Math.random() * Math.random() * 50000,
      });
    }
  }

  async getSnapshot() {
    return { tokens: Array.from(this.state.values()).map((t) => ({ ...t })) };
  }

  subscribe(cb) {
    let alive = true;
    const tick = () => {
      if (!alive) return;
      const word = this.words[(Math.random() * this.words.length) | 0];
      const type = Math.random() < 0.72 ? "buy" : "sell";
      const amount = Math.round((5 + Math.random() * Math.random() * 500));
      const st = this.state.get(word);
      if (st) {
        st.volume24h += amount;
        st.price = Math.max(0.0005, st.price * (type === "buy" ? 1 + Math.random() * 0.04 : 1 - Math.random() * 0.03));
      }
      cb({ type, word, amount, ts: Date.now() });
      setTimeout(tick, poissonDelay(1400));
    };
    setTimeout(tick, poissonDelay(1400));
    return () => { alive = false; };
  }

  async getReplay(days = 7) {
    const events = [];
    const n = Math.round(days * 40);
    const now = Date.now();
    for (let i = 0; i < n; i++) {
      const word = this.words[(Math.random() * this.words.length) | 0];
      events.push({
        type: Math.random() < 0.7 ? "buy" : "sell",
        word,
        amount: Math.round(5 + Math.random() * 300),
        ts: now - Math.random() * days * 86400000,
      });
    }
    return events.sort((a, b) => a.ts - b.ts);
  }
}

/* ============================================================
   SuperheroSource — real Trendminer data (Phase 1)
   Probed 2026-07-06, all CORS-open (Access-Control-Allow-Origin: *):
     REST  https://api.superhero.com/api/tokens (trending list, price)
     REST  https://api.superhero.com/api/transactions (buy/sell history)
     WS    https://api.superhero.com (Socket.IO — token-transaction events)
   No backend proxy needed. See CLAUDE.md Status log.
   ============================================================ */
const SUPERHERO_API = "https://api.superhero.com";

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms)),
  ]);
}

function wordFromToken(t) {
  return (t.symbol || t.name || t.sale_address || "").toUpperCase().replace(/[^A-Z0-9-]/g, "");
}

class SuperheroSource {
  constructor(nodeCount) {
    this.nodeCount = nodeCount;
    this.bySaleAddr = new Map(); // sale_address -> word, for WS event -> node lookup
  }

  async getSnapshot() {
    // API hard-caps limit at 100; the real token universe (~51 today) fits
    // in one page comfortably, so no pagination is needed
    const limit = Math.min(this.nodeCount, 100);
    const res = await withTimeout(
      fetch(`${SUPERHERO_API}/api/tokens?order_by=trending_score&order_direction=DESC&limit=${limit}&page=1`),
      8000, "getSnapshot"
    );
    if (!res.ok) throw new Error(`tokens fetch failed: ${res.status}`);
    const body = await res.json();
    const tokens = (body.items || []).map((t) => {
      const word = wordFromToken(t);
      this.bySaleAddr.set(t.sale_address, word);
      // bonding-curve prices are fractions of an AE cent — too flat to size
      // nodes by visually, so market cap (price * supply, real and
      // live-updating) drives size; trending_score drives brightness since
      // there's no direct 24h-volume field on this endpoint
      const decimals = Number(t.decimals) || 18;
      const marketCap = (parseFloat(t.market_cap) || 0) / 10 ** decimals;
      return {
        word,
        price: parseFloat(t.price_data?.ae ?? t.price) || 0,
        volume24h: Math.max(0, parseFloat(t.trending_score) || 0) * 1e5,
        marketCap,
        holders: t.holders_count,
        saleAddress: t.sale_address,
      };
    });
    return { tokens };
  }

  subscribe(cb) {
    let alive = true;
    const socket = io(SUPERHERO_API, { transports: ["websocket", "polling"] });
    this.socket = socket; // exposed for verification only
    socket.on("connect", () => console.info("[WordMesh] live WS connected:", socket.id));
    socket.on("token-transaction", (payload) => {
      if (!alive) return;
      if (payload.tx_type !== "buy" && payload.tx_type !== "sell") return;
      const saleAddr = payload.sale_address || payload.token?.sale_address;
      const word = this.bySaleAddr.get(saleAddr) || (payload.token ? wordFromToken(payload.token) : null);
      if (!word) return;
      cb({
        type: payload.tx_type,
        word,
        amount: parseFloat(payload.amount?.ae ?? payload.amount) || 1,
        ts: Date.now(),
      });
    });
    socket.on("connect_error", (err) => console.warn("[WordMesh] live WS connect error:", err.message));
    return () => { alive = false; socket.disconnect(); };
  }

  async getReplay(days = 7) {
    const events = [];
    const cutoff = Date.now() - days * 86400000;
    for (let page = 1; page <= 6; page++) {
      const res = await withTimeout(
        fetch(`${SUPERHERO_API}/api/transactions?includes=token&limit=100&page=${page}`),
        8000, "getReplay"
      );
      if (!res.ok) break;
      const body = await res.json();
      const items = body.items || [];
      if (items.length === 0) break;
      let pastCutoff = false;
      for (const tx of items) {
        if (tx.tx_type !== "buy" && tx.tx_type !== "sell") continue;
        const ts = new Date(tx.created_at).getTime();
        if (ts < cutoff) { pastCutoff = true; continue; }
        events.push({
          type: tx.tx_type,
          word: wordFromToken(tx.token || {}),
          amount: parseFloat(tx.amount?.ae ?? tx.amount) || 1,
          ts,
        });
      }
      if (pastCutoff) break;
    }
    return events.sort((a, b) => a.ts - b.ts);
  }
}

const params = new URLSearchParams(location.search);
const dataMode = params.get("data") === "live" ? "live" : "mock";
let source = new MockSource(FULL_VOCAB.slice(0, NODE_COUNT));
let liveSnapshot = null;
if (dataMode === "live") {
  try {
    const liveSource = new SuperheroSource(NODE_COUNT);
    liveSnapshot = await liveSource.getSnapshot();
    if (!liveSnapshot.tokens.length) throw new Error("empty token list");
    source = liveSource;
    document.getElementById("mock-badge").textContent = "LIVE DATA";
    document.getElementById("mock-badge").classList.add("live");
  } catch (err) {
    console.warn("[WordMesh] live data unavailable, falling back to MockSource:", err.message);
    document.getElementById("mock-badge").textContent = "MOCK DATA (live unavailable)";
  }
} else {
  document.getElementById("mock-badge").textContent = "MOCK DATA";
}

/* ============================================================
   Renderer / scene / camera rig
   ============================================================ */

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance", preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030509);
scene.fog = new THREE.FogExp2(0x030509, 0.0085);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.05, 800);
const EYE_HEIGHT = 1.6;
camera.position.set(0, 0, 0);

const rig = new THREE.Group();
rig.position.set(0, 0, 24);
rig.add(camera);
scene.add(rig);

function applyFlatEyeHeight() {
  if (!renderer.xr.isPresenting) camera.position.y = EYE_HEIGHT;
}
applyFlatEyeHeight();

// Fix 3: key + fill tuned so lit instanced spheres actually show a
// light-side/dark-side gradient — a stronger key relative to the fill
// (rather than a weak, near-shadowless rig) is what makes a sphere read as
// a sphere instead of a flat emissive blob. Kept subtle against the black
// background per threejs-visual-polish guidance — this is fill light, the
// glow is still carried by emissive + bloom.
const hemi = new THREE.HemisphereLight(0x8fb8ff, 0x0a0812, 0.32);
scene.add(hemi);
const dirLight = new THREE.DirectionalLight(0xbcd4ff, 0.45);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

/* ---- starfield backdrop (round, varied — threejs-visual-polish) ---- */
function makeCircleTexture() {
  const size = 64;
  const cnv = document.createElement("canvas");
  cnv.width = cnv.height = size;
  const ctx = cnv.getContext("2d");
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, "rgba(255,255,255,1)");
  g.addColorStop(0.4, "rgba(255,255,255,0.7)");
  g.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const circleTex = makeCircleTexture();

function buildStarfield() {
  const STAR_COUNT = 1400;
  const positions = new Float32Array(STAR_COUNT * 3);
  const colors = new Float32Array(STAR_COUNT * 3);
  const sizes = new Float32Array(STAR_COUNT);
  const color = new THREE.Color();
  for (let i = 0; i < STAR_COUNT; i++) {
    const r = 260 + Math.random() * 140;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.cos(phi);
    positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const warmth = Math.random();
    if (warmth < 0.08) color.setHSL(0.08, 0.6, 0.75);
    else if (warmth < 0.16) color.setHSL(0.58, 0.5, 0.78);
    else color.setHSL(0.6, 0.05, 0.9);
    color.toArray(colors, i*3);
    sizes[i] = Math.random() < 0.06 ? 2.6 + Math.random()*2 : 0.6 + Math.random()*1.2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  geo.setAttribute("size", new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({
    size: 1, map: circleTex, vertexColors: true, transparent: true,
    depthWrite: false, sizeAttenuation: true,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
}
buildStarfield();

/* ============================================================
   Word-node mesh (InstancedMesh, one draw call — perf budget)
   ============================================================ */

const words = (dataMode === "live" && liveSnapshot)
  ? liveSnapshot.tokens.map((t) => t.word).slice(0, NODE_COUNT)
  : FULL_VOCAB.slice(0, NODE_COUNT);
// Fix 3: real lit spheres, not flat discs. SphereGeometry (vs. the old
// low-poly icosahedron) gives a smooth normal across the surface so the
// key/fill rig above produces a visible light-side/dark-side gradient.
const nodeGeo = new THREE.SphereGeometry(1, 24, 16);
// Per-instance emissive tint + luminance correction (Fix 3 "bloom
// luminance"). Deliberately a SEPARATE attribute from instanceColor (which
// drives the diffuse channel and already carries the existing flare/volume
// brightness multiplier, uncapped up to 1.6x — see refreshInstances): baking
// emissive from that same boosted value compounded with the per-hue scale
// below and blew out every high-volume (typically larger) node to white.
// This carries the node's PURE hue (not intensity-boosted) so the glow
// stays controlled regardless of trade activity; blue reads darkest at
// equal HSL sat/lightness and needs a lift so it doesn't disappear under
// bloom, green/white/cream read brightest and get reined in — otherwise one
// hue would visually dominate the whole mesh. Both written once at node
// creation/revival (the values only depend on hue, constant for a node's
// lifetime), not per frame.
nodeGeo.setAttribute("instanceEmissiveColor", new THREE.InstancedBufferAttribute(new Float32Array(NODE_COUNT * 3).fill(1), 3));
nodeGeo.setAttribute("instanceEmissiveScale", new THREE.InstancedBufferAttribute(new Float32Array(NODE_COUNT).fill(1), 1));
function emissiveScaleForColor(color) {
  const lum = 0.2126 * color.r + 0.7152 * color.g + 0.0722 * color.b;
  return THREE.MathUtils.clamp(0.35 / Math.max(0.12, lum), 0.4, 1.5);
}
function writeEmissiveAttributes(index, color) {
  nodeGeo.attributes.instanceEmissiveColor.setXYZ(index, color.r, color.g, color.b);
  nodeGeo.attributes.instanceEmissiveColor.needsUpdate = true;
  nodeGeo.attributes.instanceEmissiveScale.array[index] = emissiveScaleForColor(color);
  nodeGeo.attributes.instanceEmissiveScale.needsUpdate = true;
}
const nodeMat = new THREE.MeshStandardMaterial({
  color: 0xd8d8d8, // instanceColor (hue + existing flare/volume boost) drives diffuse
  emissive: 0xffffff, // instanceEmissiveColor (pure hue) + per-hue scale, patched in below
  emissiveIntensity: 0.5,
  roughness: 0.4, metalness: 0,
});
// Fresnel rim (Fix 3 "pop"): a real view-angle-dependent edge glow, added
// straight into the shaded output, so sphere silhouettes read against the
// black background instead of just the flat emissive halo bloom already
// gives every node. Kept as a shader patch (not a second back-shell mesh)
// so the node system stays a single InstancedMesh / one draw call.
const NODE_FRESNEL_COLOR = new THREE.Color(0x9fd8ff);
nodeMat.onBeforeCompile = (shader) => {
  shader.uniforms.fresnelColor = { value: NODE_FRESNEL_COLOR };
  shader.vertexShader = shader.vertexShader
    .replace(
      "#include <common>",
      "#include <common>\nattribute float instanceEmissiveScale;\nattribute vec3 instanceEmissiveColor;\nvarying float vInstanceEmissiveScale;\nvarying vec3 vInstanceEmissiveColor;"
    )
    .replace(
      "#include <begin_vertex>",
      "#include <begin_vertex>\nvInstanceEmissiveScale = instanceEmissiveScale;\nvInstanceEmissiveColor = instanceEmissiveColor;"
    );
  shader.fragmentShader = shader.fragmentShader
    .replace("#include <common>", "#include <common>\nvarying float vInstanceEmissiveScale;\nvarying vec3 vInstanceEmissiveColor;\nuniform vec3 fresnelColor;")
    .replace(
      "#include <emissivemap_fragment>",
      `#include <emissivemap_fragment>
       totalEmissiveRadiance *= vInstanceEmissiveScale * vInstanceEmissiveColor;`
    )
    .replace(
      "#include <dithering_fragment>",
      `float wmFresnel = pow(1.0 - clamp(dot(normalize(vNormal), normalize(vViewPosition)), 0.0, 1.0), 2.5);
       gl_FragColor.rgb += wmFresnel * fresnelColor * 0.85;
       #include <dithering_fragment>`
    );
};
const nodeMesh = new THREE.InstancedMesh(nodeGeo, nodeMat, NODE_COUNT);
nodeMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(nodeMesh);

// distant LOD: point-sprite stand-ins, swapped in per-frame by hiding the
// corresponding instanced mesh instance (scale 0) beyond LOD_DIST
const LOD_DIST = 55;
const farGeo = new THREE.BufferGeometry();
const farPositions = new Float32Array(NODE_COUNT * 3);
const farColors = new Float32Array(NODE_COUNT * 3);
farGeo.setAttribute("position", new THREE.BufferAttribute(farPositions, 3));
farGeo.setAttribute("color", new THREE.BufferAttribute(farColors, 3));
farGeo.setDrawRange(0, 0);
const farMat = new THREE.PointsMaterial({
  size: 3.2, map: circleTex, vertexColors: true, transparent: true, opacity: 0.9,
  depthWrite: false, sizeAttenuation: true,
});
const farPoints = new THREE.Points(farGeo, farMat);
scene.add(farPoints);

const nodeData = [];
const tmpObj = new THREE.Object3D();
const tmpColor = new THREE.Color();

function priceToScale(price) { return 0.35 + Math.min(1.6, Math.log10(1 + price * 40) * 0.55); }
function volumeToIntensity(vol) { return 0.6 + Math.min(2.4, Math.log10(1 + vol) * 0.4); }
function hueForWord(i) {
  return (i * 0.618033) % 1;
}

// live-mode real market caps/volumes span many orders of magnitude (143 to
// 1.6M+ AE observed) and saturate the mock-tuned log formulas above, which
// were tuned for MockSource's 0.002-4 price range — every real node would
// render at the same maxed-out size. Instead, normalize log-scale within
// the current snapshot's actual min/max so size and brightness spread
// across the full visual range regardless of the real values' absolute
// scale. reviveSlot() reuses the same stored range for consistency.
let liveSizeRange = null, liveVolRange = null;
function liveNormScale(v, range, lo, hi) {
  if (!range || range.max <= range.min) return (lo + hi) / 2;
  const t = (Math.log10(1 + Math.max(0, v)) - range.min) / (range.max - range.min);
  return lo + Math.max(0, Math.min(1, t)) * (hi - lo);
}

async function initNodes() {
  const snap = liveSnapshot || await source.getSnapshot();
  const byWord = new Map(snap.tokens.map((t) => [t.word, t]));
  if (dataMode === "live") {
    const mcLogs = snap.tokens.map((t) => Math.log10(1 + Math.max(0, t.marketCap || 0)));
    const volLogs = snap.tokens.map((t) => Math.log10(1 + Math.max(0, t.volume24h || 0)));
    liveSizeRange = { min: Math.min(...mcLogs), max: Math.max(...mcLogs) };
    liveVolRange = { min: Math.min(...volLogs), max: Math.max(...volLogs) };
  }
  for (let i = 0; i < words.length; i++) {
    const word = words[i];
    const tok = byWord.get(word);
    const r = 14 + Math.random() * 46;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const pos = new THREE.Vector3(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi) * 0.6,
      r * Math.sin(phi) * Math.sin(theta)
    );
    const hue = hueForWord(i);
    const baseColor = new THREE.Color().setHSL(hue, 0.75, 0.55);
    const sizeMetric = tok.marketCap != null ? tok.marketCap : tok.price;
    const scale = dataMode === "live"
      ? liveNormScale(sizeMetric, liveSizeRange, 0.35, 1.95)
      : priceToScale(sizeMetric);
    const intensity = dataMode === "live"
      ? liveNormScale(tok.volume24h, liveVolRange, 0.6, 3.0)
      : volumeToIntensity(tok.volume24h);
    const entry = {
      word, index: i, alive: true,
      price: tok.price, volume24h: tok.volume24h, marketCap: tok.marketCap,
      pos, baseColor,
      scale, intensity,
      flare: 0, // decays each frame, added to intensity/scale on events
      dying: false, dieT: 0, spawnT: 1,
    };
    nodeData.push(entry);
    writeEmissiveAttributes(i, baseColor);
  }
  // unused instance slots (live mode may have fewer real tokens than
  // NODE_COUNT) — hide them, refreshInstances() only iterates nodeData
  for (let i = words.length; i < NODE_COUNT; i++) {
    tmpObj.position.set(0, -9999, 0);
    tmpObj.scale.setScalar(0.0001);
    tmpObj.updateMatrix();
    nodeMesh.setMatrixAt(i, tmpObj.matrix);
  }
  refreshInstances();
  buildEdges();
}

function refreshInstances() {
  for (const n of nodeData) {
    const s = (n.alive && !n.isFar ? n.scale : 0) * n.spawnT * (1 + n.flare * 0.9);
    tmpObj.position.copy(n.pos);
    tmpObj.scale.setScalar(Math.max(0.0001, s * 0.55));
    tmpObj.rotation.set(0, 0, 0);
    tmpObj.updateMatrix();
    nodeMesh.setMatrixAt(n.index, tmpObj.matrix);
    const mult = Math.min(1.6, (n.intensity + n.flare * 2.2) * 0.5);
    tmpColor.copy(n.baseColor).multiplyScalar(mult);
    nodeMesh.setColorAt(n.index, tmpColor);
  }
  nodeMesh.instanceMatrix.needsUpdate = true;
  if (nodeMesh.instanceColor) nodeMesh.instanceColor.needsUpdate = true;
}

/* ---- related-word edges: single LineSegments buffer, rebuilt <=1/s ---- */
const MAX_EDGES = NODE_COUNT * 3;
const edgeGeo = new THREE.BufferGeometry();
const edgePositions = new Float32Array(MAX_EDGES * 2 * 3);
const edgeColors = new Float32Array(MAX_EDGES * 2 * 3);
edgeGeo.setAttribute("position", new THREE.BufferAttribute(edgePositions, 3));
edgeGeo.setAttribute("color", new THREE.BufferAttribute(edgeColors, 3));
edgeGeo.setDrawRange(0, 0);
const edgeMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
scene.add(edgeLines);

let adjacency = []; // adjacency[i] = Set of neighbor indices

function nearestNeighbors(i, k) {
  const src = nodeData[i];
  const dists = [];
  for (const n of nodeData) {
    if (n.index === i || !n.alive) continue;
    dists.push([n.index, src.pos.distanceToSquared(n.pos)]);
  }
  dists.sort((a, b) => a[1] - b[1]);
  return dists.slice(0, k).map((d) => d[0]);
}

function buildEdges() {
  adjacency = nodeData.map(() => new Set());
  for (const n of nodeData) {
    if (!n.alive) continue;
    const k = 2 + ((n.index % 3) === 0 ? 1 : 0);
    for (const j of nearestNeighbors(n.index, k)) {
      adjacency[n.index].add(j);
      adjacency[j].add(n.index);
    }
  }
  writeEdgeBuffer();
}

function writeEdgeBuffer() {
  let vi = 0;
  const seen = new Set();
  outer: for (let i = 0; i < adjacency.length; i++) {
    for (const j of adjacency[i]) {
      const key = i < j ? `${i}_${j}` : `${j}_${i}`;
      if (seen.has(key)) continue;
      seen.add(key);
      if (vi >= MAX_EDGES) break outer;
      const a = nodeData[i], b = nodeData[j];
      edgePositions[vi*6+0] = a.pos.x; edgePositions[vi*6+1] = a.pos.y; edgePositions[vi*6+2] = a.pos.z;
      edgePositions[vi*6+3] = b.pos.x; edgePositions[vi*6+4] = b.pos.y; edgePositions[vi*6+5] = b.pos.z;
      const c1 = a.baseColor, c2 = b.baseColor;
      edgeColors[vi*6+0]=c1.r; edgeColors[vi*6+1]=c1.g; edgeColors[vi*6+2]=c1.b;
      edgeColors[vi*6+3]=c2.r; edgeColors[vi*6+4]=c2.g; edgeColors[vi*6+5]=c2.b;
      vi++;
    }
  }
  edgeGeo.setDrawRange(0, vi * 2);
  edgeGeo.attributes.position.needsUpdate = true;
  edgeGeo.attributes.color.needsUpdate = true;
  edgeLines.userData.edgeList = Array.from(seen).map((k) => k.split("_").map(Number));
}

/* ============================================================
   Pulses — light traveling down an edge (shader/uv anim, pooled)
   ============================================================ */
const MAX_PULSES = 48;
const pulseGeo = new THREE.SphereGeometry(1, 6, 6);
const pulseMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending });
const pulseMesh = new THREE.InstancedMesh(pulseGeo, pulseMat, MAX_PULSES);
pulseMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(pulseMesh);
const pulses = []; // {from, to, t, speed, color, replay}
for (let i = 0; i < MAX_PULSES; i++) pulses.push({ active: false });
const _pv = new THREE.Vector3();

function spawnPulse(fromIdx, toIdx, color, replay = false) {
  const slot = pulses.find((p) => !p.active);
  if (!slot) return;
  slot.active = true;
  slot.from = fromIdx; slot.to = toIdx; slot.t = 0;
  slot.speed = replay ? 0.35 : 0.6 + Math.random() * 0.3;
  slot.color = color; slot.replay = replay;
}

function edgeTowardNode(targetIdx) {
  const neighbors = adjacency[targetIdx];
  if (!neighbors || neighbors.size === 0) return null;
  const arr = Array.from(neighbors).filter((j) => nodeData[j].alive);
  if (arr.length === 0) return null;
  return arr[(Math.random() * arr.length) | 0];
}

/* ============================================================
   Node flare + Erlang beat (die / reroute / respawn every ~60s)
   ============================================================ */
const usedWords = new Set(words);
const spareWords = FULL_VOCAB.filter((w) => !usedWords.has(w));

function flareNode(word, type) {
  const n = nodeData.find((d) => d.word === word && d.alive);
  if (!n) return;
  n.flare = type === "sell" ? 0.35 : 0.9;
  const fromIdx = edgeTowardNode(n.index);
  if (fromIdx !== null) spawnPulse(fromIdx, n.index, n.baseColor.clone().lerp(new THREE.Color(0xffffff), 0.4), false);
  updateNodeInfo(n, type);
}

function onDataEvent(evt) {
  if (evt.type === "buy" || evt.type === "sell") flareNode(evt.word, evt.type);
}
source.subscribe(onDataEvent);

/* ---- Replay layer (CLAUDE.md decision 6): compress the last ~7 days of
   real trades into a short repeating loop so the room always breathes
   under the live feed's tiny real-time volume. Dimmer/cooler pulses, no
   node scale/flare beyond a faint nudge, no HUD update — kept visually
   and functionally distinct from genuine live buy/sell events. ---- */
function flareNodeReplay(word) {
  const n = nodeData.find((d) => d.word === word && d.alive);
  if (!n) return;
  n.flare = Math.max(n.flare, 0.12);
  const fromIdx = edgeTowardNode(n.index);
  if (fromIdx === null) return;
  const cool = n.baseColor.clone().lerp(new THREE.Color(0x3a6fb0), 0.6).multiplyScalar(0.55);
  spawnPulse(fromIdx, n.index, cool, true);
}

const REPLAY_LOOP_MS = 90000; // ~7 real days compressed into 90s, looping
async function startReplayLoop() {
  if (dataMode !== "live") return;
  let events;
  try {
    events = await source.getReplay(7);
  } catch (err) {
    console.warn("[WordMesh] replay fetch failed:", err.message);
    return;
  }
  if (!events.length) return;
  const first = events[0].ts, last = events[events.length - 1].ts;
  const span = Math.max(1, last - first);
  const schedule = () => {
    for (const evt of events) {
      const delay = ((evt.ts - first) / span) * REPLAY_LOOP_MS;
      setTimeout(() => flareNodeReplay(evt.word), delay);
    }
  };
  schedule();
  setInterval(schedule, REPLAY_LOOP_MS);
}
startReplayLoop();

let lastInfoNode = null, infoTimeout = null;
// type is optional: trade events pass 'buy'/'sell'; hover/select (Fix 1/2 —
// this is the readout truncated labels resolve their full name through)
// call it with no type for a plain name/price/volume readout.
function updateNodeInfo(n, type) {
  lastInfoNode = n;
  const el = document.getElementById("node-info");
  const prefix = type ? `${type.toUpperCase()} · ` : "";
  el.innerHTML = `<b>${n.word}</b><br/>${prefix}price ${n.price.toFixed(4)} AE · vol24h ${Math.round(n.volume24h)}`;
  el.classList.add("show");
  clearTimeout(infoTimeout);
  infoTimeout = setTimeout(() => el.classList.remove("show"), 2600);
}

const ERLANG_INTERVAL = 60000;
let erlangTimer = 0;
function erlangBeat() {
  const alive = nodeData.filter((n) => n.alive && !n.dying);
  if (alive.length === 0) return;
  const victim = alive[(Math.random() * alive.length) | 0];
  victim.dying = true;
  victim.dieT = 0;
}

function reviveSlot(n) {
  if (dataMode === "live") {
    // real token universe is small and fixed by symbol — respawn the same
    // real word rather than inventing a replacement one
  } else {
    const pool = spareWords.length ? spareWords : FULL_VOCAB;
    const newWord = pool[(Math.random() * pool.length) | 0];
    const idx = spareWords.indexOf(newWord);
    if (idx >= 0) spareWords.splice(idx, 1);
    n.word = newWord;
    n.price = 0.002 + Math.random() * Math.random() * 4;
    n.volume24h = Math.random() * Math.random() * 50000;
  }
  const sizeMetric = n.marketCap != null ? n.marketCap : n.price;
  if (dataMode === "live") {
    n.scale = liveNormScale(sizeMetric, liveSizeRange, 0.35, 1.95);
    n.intensity = liveNormScale(n.volume24h, liveVolRange, 0.6, 3.0);
  } else {
    n.scale = priceToScale(sizeMetric);
    n.intensity = volumeToIntensity(n.volume24h);
  }
  const r = 14 + Math.random() * 46;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  n.pos.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi) * 0.6, r * Math.sin(phi) * Math.sin(theta));
  n.baseColor = new THREE.Color().setHSL(Math.random(), 0.75, 0.55);
  writeEmissiveAttributes(n.index, n.baseColor);
  n.alive = true; n.dying = false; n.spawnT = 0;
}

/* ============================================================
   WebXR mode switcher (skill: enter/exit lifecycle, sessionend)
   ============================================================ */
const btnFlat = document.getElementById("btn-flat");
const btnVR = document.getElementById("btn-vr");
const btnAR = document.getElementById("btn-ar");
const hud = document.getElementById("hud");
let currentSession = null;

async function detectXRSupport() {
  if (!navigator.xr) return;
  try { if (await navigator.xr.isSessionSupported("immersive-vr")) btnVR.disabled = false; } catch {}
  try { if (await navigator.xr.isSessionSupported("immersive-ar")) btnAR.disabled = false; } catch {}
}
detectXRSupport();

const savedBackground = scene.background;
const savedFog = scene.fog;

async function enterXR(mode) {
  if (!navigator.xr) return;
  try {
    const session = await navigator.xr.requestSession(mode, {
      optionalFeatures: ["local-floor", "dom-overlay", "hit-test"],
      domOverlay: mode === "immersive-ar" ? { root: document.body } : undefined,
    });
    currentSession = session;
    await renderer.xr.setSession(session);
    hud.classList.add("in-xr");
    [btnFlat, btnVR, btnAR].forEach((b) => b.classList.remove("active"));
    (mode === "immersive-vr" ? btnVR : btnAR).classList.add("active");
    if (mode === "immersive-ar") {
      // AR passthrough is the environment — suppress the opaque backdrop/fog
      // shell entirely so the real world shows through (shell-off in AR).
      scene.background = null;
      scene.fog = null;
    }
    session.addEventListener("end", onXRSessionEnd);
  } catch (err) {
    console.warn("[WordMesh] XR session request failed:", err);
  }
}
function onXRSessionEnd() {
  currentSession = null;
  hud.classList.remove("in-xr");
  [btnFlat, btnVR, btnAR].forEach((b) => b.classList.remove("active"));
  btnFlat.classList.add("active");
  scene.background = savedBackground;
  scene.fog = savedFog;
  applyFlatEyeHeight();
}
renderer.xr.addEventListener("sessionend", onXRSessionEnd);

btnFlat.addEventListener("click", () => { if (currentSession) currentSession.end(); });
btnVR.addEventListener("click", () => enterXR("immersive-vr"));
btnAR.addEventListener("click", () => enterXR("immersive-ar"));

/* ============================================================
   Locomotion — desktop / mobile / VR (unified fly-by-default)
   ============================================================ */
const isCoarsePointer = matchMedia("(pointer: coarse) and (not (pointer: fine))").matches;
let flyMode = true;
const btnFly = document.getElementById("btn-fly");
btnFly.addEventListener("click", () => {
  flyMode = !flyMode;
  btnFly.textContent = `Fly: ${flyMode ? "ON" : "OFF"}`;
  btnFly.classList.toggle("on", flyMode);
});

const keys = new Set();
window.addEventListener("keydown", (e) => {
  keys.add(e.code);
  if (e.code === "KeyF") btnFly.click();
  // Space/Ctrl drive vertical fly — stop Space from scrolling the page or
  // re-clicking whatever HUD button last had focus
  if (e.code === "Space" || e.code === "ControlLeft" || e.code === "ControlRight") e.preventDefault();
});
window.addEventListener("keyup", (e) => keys.delete(e.code));

// hold-drag look (desktop) — a plain click stays free to interact
let dragging = false, lastX = 0, lastY = 0;
let yaw = 0, pitch = 0;
canvas.addEventListener("pointerdown", (e) => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener("pointerup", () => { dragging = false; });
window.addEventListener("pointermove", (e) => {
  if (pointerLocked) {
    yaw -= e.movementX * 0.0022;
    pitch -= e.movementY * 0.0022;
    pitch = Math.max(-1.4, Math.min(1.4, pitch));
    return;
  }
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  yaw -= dx * 0.0035;
  pitch -= dy * 0.0035;
  pitch = Math.max(-1.4, Math.min(1.4, pitch));
});

// Fix 2 (cosmetic): hover/tap node picking, purely to resolve a truncated
// label's full name in the existing #node-info readout and to give the
// hovered/selected node's label top overlap priority. Separate listeners —
// doesn't alter the drag/look handlers above.
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(-2, -2); // starts off-screen
window.addEventListener("pointermove", (e) => {
  if (dragging || pointerLocked) return;
  mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
});
canvas.addEventListener("pointerdown", (e) => {
  mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouseNDC, camera);
  const hit = raycaster.intersectObject(nodeMesh)[0];
  if (hit && hit.instanceId != null && nodeData[hit.instanceId] && nodeData[hit.instanceId].alive) {
    selectedNodeIndex = hit.instanceId;
    selectedUntil = performance.now() + 4000;
    updateNodeInfo(nodeData[hit.instanceId]);
  }
});

// free-look toggle: desktop -> pointer lock, mobile -> gyro
let pointerLocked = false;
const btnFreelook = document.getElementById("btn-freelook");
const escHint = document.getElementById("esc-hint");
let gyroEnabled = false;
// gyro drives yaw/pitch as a DELTA from wherever look was when enabled, not
// as an absolute compass/tilt reading — using the raw absolute angles snapped
// the view to an unrelated orientation the instant free-look was toggled on,
// and compass heading (alpha) drifts independently of how far you've turned.
let gyroBaseAlpha = null, gyroBaseBeta = null, gyroYawBase = 0, gyroPitchBase = 0;

btnFreelook.addEventListener("click", async () => {
  if (isCoarsePointer) {
    if (!gyroEnabled) {
      if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== "granted") return;
        } catch { return; }
      }
      gyroEnabled = true;
      gyroBaseAlpha = null; // next deviceorientation event just calibrates, no snap
      gyroBaseBeta = null;
      btnFreelook.textContent = "Free look: ON";
      btnFreelook.classList.add("on");
    } else {
      gyroEnabled = false;
      btnFreelook.textContent = "Free look: OFF";
      btnFreelook.classList.remove("on");
    }
  } else {
    if (!pointerLocked) canvas.requestPointerLock();
    else document.exitPointerLock();
  }
});
document.addEventListener("pointerlockchange", () => {
  pointerLocked = document.pointerLockElement === canvas;
  btnFreelook.textContent = `Free look: ${pointerLocked ? "ON" : "OFF"}`;
  btnFreelook.classList.toggle("on", pointerLocked);
  escHint.classList.toggle("show", pointerLocked);
});

window.addEventListener("deviceorientation", (e) => {
  if (!gyroEnabled || e.alpha === null || e.beta === null) return;
  if (gyroBaseAlpha === null) {
    // first sample after enabling: record the baseline, don't move the view yet
    gyroBaseAlpha = e.alpha; gyroBaseBeta = e.beta;
    gyroYawBase = yaw; gyroPitchBase = pitch;
    return;
  }
  let dAlpha = e.alpha - gyroBaseAlpha;
  if (dAlpha > 180) dAlpha -= 360; // alpha wraps 0..360 (compass heading)
  if (dAlpha < -180) dAlpha += 360;
  const dBeta = e.beta - gyroBaseBeta;
  yaw = gyroYawBase - THREE.MathUtils.degToRad(dAlpha);
  pitch = Math.max(-1.4, Math.min(1.4, gyroPitchBase + THREE.MathUtils.degToRad(dBeta)));
});

// mobile on-screen joystick
const joyWrap = document.getElementById("joystick-wrap");
const joyNub = document.getElementById("joystick-nub");
let joyVec = { x: 0, y: 0 };
let mobileVertical = 0; // -1/0/1 from the on-screen ascend/descend buttons
if (isCoarsePointer) {
  joyWrap.classList.add("show");
  document.getElementById("controls-hint").textContent = "drag to look · joystick to fly";
  let joyActive = false, joyId = null, joyCenter = { x: 0, y: 0 };
  joyWrap.addEventListener("pointerdown", (e) => {
    joyActive = true; joyId = e.pointerId;
    const r = joyWrap.getBoundingClientRect();
    joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2 };
    e.stopPropagation();
  });
  window.addEventListener("pointermove", (e) => {
    if (!joyActive || e.pointerId !== joyId) return;
    let dx = e.clientX - joyCenter.x, dy = e.clientY - joyCenter.y;
    const max = 35;
    const len = Math.hypot(dx, dy);
    if (len > max) { dx = dx / len * max; dy = dy / len * max; }
    joyNub.style.left = `${33 + dx}px`;
    joyNub.style.top = `${33 + dy}px`;
    joyVec = { x: dx / max, y: dy / max };
  });
  window.addEventListener("pointerup", (e) => {
    if (e.pointerId !== joyId) return;
    joyActive = false; joyVec = { x: 0, y: 0 };
    joyNub.style.left = "33px"; joyNub.style.top = "33px";
  });

  // dedicated vertical (ascend/descend) buttons — mobile has no clean way to
  // fly straight up/down otherwise, since pitch is tied to look direction
  const vertWrap = document.getElementById("vert-wrap");
  vertWrap.classList.add("show");
  const btnUp = document.getElementById("btn-up");
  const btnDown = document.getElementById("btn-down");
  const setVertical = (btn, v) => (e) => {
    e.stopPropagation();
    mobileVertical = v;
    btnUp.classList.toggle("active", v > 0);
    btnDown.classList.toggle("active", v < 0);
  };
  btnUp.addEventListener("pointerdown", setVertical(btnUp, 1));
  btnDown.addEventListener("pointerdown", setVertical(btnDown, -1));
  ["pointerup", "pointercancel", "pointerleave"].forEach((evt) => {
    btnUp.addEventListener(evt, setVertical(btnUp, 0));
    btnDown.addEventListener(evt, setVertical(btnDown, 0));
  });
}

// fade the controls hint after first input or a few seconds
const controlsHint = document.getElementById("controls-hint");
let hintHidden = false;
function hideHint() { if (!hintHidden) { hintHidden = true; controlsHint.classList.add("hidden"); } }
setTimeout(hideHint, 6000);
canvas.addEventListener("pointerdown", hideHint, { once: true });

/* ============================================================
   Billboard labels (cosmetic pass: auto-fit, tethered, decluttered)
   - one pooled sprite set, size LABEL_TOP_K + 1: top-K by vol24h, plus the
     hovered/selected node if it isn't already in that set (highest overlap
     priority — index 0 of `chosen`).
   - each label's canvas is sized exactly to its measured text (Fix 1: the
     pill can never be narrower than the text it holds); long tickers are
     capped and shown with a real ellipsis, full name lives in the existing
     #node-info readout on hover/select.
   - screen-space overlap is resolved every frame in priority order (higher
     vol24h / hover / select wins); a thin tether line + colour-matched dot
     + colour-tinted underline visually ties each label to its node.
   Sprite is always camera-facing (THREE.Sprite billboards by default).
   ============================================================ */
const LABEL_DPR = Math.min(window.devicePixelRatio || 1, 2);
const LABEL_FONT_PX = 34 * LABEL_DPR;
const LABEL_PAD_X = 22 * LABEL_DPR, LABEL_PAD_Y = 14 * LABEL_DPR;
const LABEL_DOT_R = 7 * LABEL_DPR, LABEL_DOT_GAP = 12 * LABEL_DPR;
const LABEL_WORLD_HEIGHT = 0.6; // fixed world-space height; width follows text via canvas aspect
const LABEL_MAX_CHARS = 12;
const LABEL_TRUNCATE_CHARS = 9; // "LITCHSUPERHERO" (14) -> "LITCHSUPE…"

function displayWord(word) {
  return word.length > LABEL_MAX_CHARS ? word.slice(0, LABEL_TRUNCATE_CHARS) + "…" : word;
}

const labelPool = [];
function makeLabelSprite() {
  const cnv = document.createElement("canvas");
  cnv.width = 4; cnv.height = 4; // real size set per-paint, once text is measured
  const tex = new THREE.CanvasTexture(cnv);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.visible = false;
  scene.add(sprite);
  return { sprite, cnv, tex, lastWord: null, lastHex: null, nodeIndex: -1, baseW: 1, baseH: 1, textW: 0, dotSpace: 0 };
}
for (let i = 0; i < LABEL_TOP_K + 1; i++) labelPool.push(makeLabelSprite());

// Fix 1: canvas is sized exactly to the measured text (+ padding + dot),
// at devicePixelRatio, so the pill can never clip — then the sprite is
// scaled by the canvas's own aspect ratio, at a fixed world-space height.
// Fix 2: colour-matched dot + a colour-tinted underline strip tie the
// label to its node visually.
function paintLabelAutoFit(entry, word, hexColor) {
  const text = displayWord(word);
  const measureCtx = entry.cnv.getContext("2d");
  measureCtx.font = `700 ${LABEL_FONT_PX}px -apple-system, sans-serif`;
  const textW = measureCtx.measureText(text).width;
  const dotSpace = LABEL_DOT_R * 2 + LABEL_DOT_GAP;
  const w = Math.ceil(dotSpace + textW + LABEL_PAD_X * 2);
  const h = Math.ceil(LABEL_FONT_PX * 1.15 + LABEL_PAD_Y * 2);
  entry.cnv.width = w;
  entry.cnv.height = h; // resizing clears the canvas + resets context state
  const ctx = entry.cnv.getContext("2d");
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "rgba(6,10,20,0.6)";
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, h / 2);
  ctx.fill();
  ctx.fillStyle = hexColor;
  ctx.beginPath();
  ctx.arc(LABEL_PAD_X * 0.5 + dotSpace / 2, h / 2, LABEL_DOT_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = `700 ${LABEL_FONT_PX}px -apple-system, sans-serif`;
  ctx.fillStyle = "#eaf6ff";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.shadowColor = hexColor;
  ctx.shadowBlur = 7 * LABEL_DPR;
  const textX = LABEL_PAD_X * 0.5 + dotSpace;
  ctx.fillText(text, textX, h / 2 - LABEL_DPR);
  ctx.shadowBlur = 0;
  ctx.fillStyle = hexColor;
  ctx.globalAlpha = 0.85;
  ctx.fillRect(textX, h - LABEL_PAD_Y * 0.7, textW, Math.max(2, 2 * LABEL_DPR));
  ctx.globalAlpha = 1;
  entry.tex.needsUpdate = true;
  entry.lastWord = word;
  entry.lastHex = hexColor;
  const aspect = w / h;
  entry.baseW = LABEL_WORLD_HEIGHT * aspect;
  entry.baseH = LABEL_WORLD_HEIGHT;
}

function smoothstep01(edge0, edge1, x) {
  const t = Math.min(1, Math.max(0, (x - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}

// Fix 2 declutter: hovered/selected node (set by the raycast hit-testing
// further down) always gets a label even if outside the top-K, and takes
// top overlap priority.
let hoveredNodeIndex = -1, selectedNodeIndex = -1, selectedUntil = 0;

const LABEL_RECOMPUTE_MS = 350;
let lastLabelRecompute = -Infinity;
function updateVisibleLabels(time) {
  if (time - lastLabelRecompute < LABEL_RECOMPUTE_MS) return;
  lastLabelRecompute = time;
  if (selectedNodeIndex >= 0 && time > selectedUntil) selectedNodeIndex = -1;
  for (const n of nodeData) n.isTopWord = false;
  const ranked = nodeData.filter((n) => n.alive).sort((a, b) => b.volume24h - a.volume24h);
  const extraIdx = selectedNodeIndex >= 0 ? selectedNodeIndex : hoveredNodeIndex;
  const extraNode = extraIdx >= 0 && nodeData[extraIdx] && nodeData[extraIdx].alive ? nodeData[extraIdx] : null;
  const chosen = [];
  if (extraNode) chosen.push(extraNode);
  for (const n of ranked) {
    if (chosen.length >= labelPool.length) break;
    if (extraNode && n.index === extraNode.index) continue;
    chosen.push(n);
  }
  for (const n of chosen) n.isTopWord = true;
  for (let i = 0; i < labelPool.length; i++) {
    const entry = labelPool[i];
    const n = chosen[i];
    entry.nodeIndex = n ? n.index : -1;
    if (n) {
      const hex = "#" + n.baseColor.getHexString();
      if (entry.lastWord !== n.word || entry.lastHex !== hex) paintLabelAutoFit(entry, n.word, hex);
    }
  }
}

/* ---- leader lines: node centre -> label anchor, node colour, low opacity ---- */
const leaderGeo = new THREE.BufferGeometry();
const leaderPositions = new Float32Array(labelPool.length * 2 * 3);
const leaderColors = new Float32Array(labelPool.length * 2 * 3);
leaderGeo.setAttribute("position", new THREE.BufferAttribute(leaderPositions, 3));
leaderGeo.setAttribute("color", new THREE.BufferAttribute(leaderColors, 3));
leaderGeo.setDrawRange(0, 0);
const leaderMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.4, depthWrite: false });
const leaderLines = new THREE.LineSegments(leaderGeo, leaderMat);
scene.add(leaderLines);

// scratch objects reused every frame — no per-frame allocations
const _labelCenter = new THREE.Vector3();
const _labelRight = new THREE.Vector3();
const _labelUp = new THREE.Vector3();
const _projA = new THREE.Vector3();
const _projB = new THREE.Vector3();
const _screenPos = labelPool.map(() => ({ x: 0, y: 0, halfW: 0, halfH: 0 }));
const _placedIdx = new Int32Array(labelPool.length); // scratch: indices placed so far this frame

// perspective-correct screen-space half-extent (in pixels) of a world-space
// offset from _labelCenter along a (normalized) axis — projects centre and
// an offset point and measures the pixel delta. No per-call allocation.
function screenHalfExtent(centerNDCx, centerNDCy, axisVec, halfLenWorld, screenW, screenH) {
  _projA.copy(_labelCenter).addScaledVector(axisVec, halfLenWorld).project(camera);
  const dx = (_projA.x - centerNDCx) * 0.5 * screenW;
  const dy = (_projA.y - centerNDCy) * 0.5 * screenH;
  return Math.hypot(dx, dy);
}

function boxesOverlap(a, b) {
  return Math.abs(a.x - b.x) < (a.halfW + b.halfW) && Math.abs(a.y - b.y) < (a.halfH + b.halfH);
}

/* ============================================================
   Resize handling (visual viewport aware — mobile URL-bar safe)
   ============================================================ */
function resize() {
  const vv = window.visualViewport;
  const w = vv ? vv.width : window.innerWidth;
  const h = vv ? vv.height : window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 300));
if (window.visualViewport) window.visualViewport.addEventListener("resize", resize);

/* ============================================================
   Post-processing (flat modes only — skip in XR)
   ============================================================ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.4, 0.9);
bloom.resolution = new THREE.Vector2(window.innerWidth/2, window.innerHeight/2);
composer.addPass(bloom);
composer.addPass(new OutputPass());
resize();

/* ============================================================
   VR controller polling (best-effort — see status log)
   ============================================================ */
let flyClickPrev = false;
let snapCooldown = 0;
function pollVRControllers(session) {
  let moveX = 0, moveY = 0, turnX = 0;
  for (const src of session.inputSources) {
    if (!src.gamepad) continue;
    const gp = src.gamepad;
    if (src.handedness === "left") {
      moveX = gp.axes[2] || 0;
      moveY = gp.axes[3] || 0;
    } else if (src.handedness === "right") {
      turnX = gp.axes[2] || 0;
      const clicked = !!(gp.buttons[3] && gp.buttons[3].pressed);
      if (clicked && !flyClickPrev) btnFly.click();
      flyClickPrev = clicked;
    }
  }
  return { moveX, moveY, turnX };
}

/* ============================================================
   Main loop — no per-frame allocations beyond reused temporaries
   ============================================================ */
const _fwd = new THREE.Vector3();
const _right = new THREE.Vector3();
const _flat = new THREE.Vector3();
const velocity = new THREE.Vector3();   // current smoothed velocity (units/sec), reused every frame
const _targetVel = new THREE.Vector3(); // scratch, reused every frame
const _labelOffset = new THREE.Vector3(); // scratch, reused every frame
const clock = new THREE.Clock();
let edgeRebuildAccum = 0;
let lastHoverCheck = 0;

// Tuned for "glide through a constellation": fast enough to cross the ~120-unit
// field in well under a minute, smoothed so input reads as momentum rather than
// an instant on/off snap.
const MOVE_SPEED = 5.0;
const SPRINT_SPEED = 11.0;
const VR_MOVE_SPEED = 3.6;   // gentler in-headset per XR comfort norms
const VR_SPRINT_SPEED = 7.5;
const STICK_DEADZONE = 0.12;
const VELOCITY_SMOOTH_TIME = 0.15; // seconds; lower = snappier, higher = floatier

renderer.setAnimationLoop((time, frame) => {
  const dt = Math.min(0.05, clock.getDelta());
  const smooth = 1 - Math.exp(-dt / VELOCITY_SMOOTH_TIME); // frame-rate-independent damping factor

  if (renderer.xr.isPresenting && frame) {
    const session = renderer.xr.getSession();
    const { moveX, moveY, turnX } = pollVRControllers(session);
    snapCooldown -= dt;
    if (Math.abs(turnX) > 0.65 && snapCooldown <= 0) {
      rig.rotation.y -= Math.sign(turnX) * (Math.PI / 6); // 30° snap-turn
      snapCooldown = 0.35;
    }
    camera.getWorldDirection(_fwd);
    if (!flyMode) _fwd.y = 0;
    _fwd.normalize();
    _right.crossVectors(_fwd, camera.up).normalize();

    let mx = moveX, my = -moveY;
    const mlen = Math.hypot(mx, my);
    if (mlen > 1) { mx /= mlen; my /= mlen; }
    const speed = mlen > 0.85 ? VR_SPRINT_SPEED : VR_MOVE_SPEED;
    _targetVel.set(0, 0, 0).addScaledVector(_fwd, my * speed).addScaledVector(_right, mx * speed);
    velocity.lerp(_targetVel, smooth);
    rig.position.addScaledVector(velocity, dt);
  } else {
    camera.rotation.set(pitch, yaw, 0, "YXZ");
    _fwd.set(0, 0, -1).applyEuler(camera.rotation);
    if (!flyMode) _fwd.y = 0;
    _fwd.normalize();
    _right.crossVectors(_fwd, camera.up).normalize();

    let mx = 0, my = 0;
    if (keys.has("KeyW") || keys.has("ArrowUp")) my += 1;
    if (keys.has("KeyS") || keys.has("ArrowDown")) my -= 1;
    if (keys.has("KeyD") || keys.has("ArrowRight")) mx += 1;
    if (keys.has("KeyA") || keys.has("ArrowLeft")) mx -= 1;

    // analog stick: deadzone + quadratic ease-in, applied radially (not per-axis)
    // so diagonal deflection isn't distorted
    const jmag = Math.hypot(joyVec.x, joyVec.y);
    if (jmag > STICK_DEADZONE) {
      const t = Math.min(1, (jmag - STICK_DEADZONE) / (1 - STICK_DEADZONE));
      const eased = (t * t) / jmag;
      mx += joyVec.x * eased;
      my -= joyVec.y * eased;
    }
    // clamp combined input to unit magnitude — digital WASD diagonals used to
    // move at sqrt(2)x speed since forward+strafe were added independently
    const mlen = Math.hypot(mx, my);
    if (mlen > 1) { mx /= mlen; my /= mlen; }

    let vy = 0;
    if (flyMode) {
      if (keys.has("Space")) vy += 1;
      if (keys.has("ControlLeft") || keys.has("ControlRight")) vy -= 1;
      vy += mobileVertical;
    }
    vy = Math.max(-1, Math.min(1, vy));

    const sprint = keys.has("ShiftLeft") || keys.has("ShiftRight") || jmag > 0.9;
    const speed = sprint ? SPRINT_SPEED : MOVE_SPEED;

    _targetVel.set(0, 0, 0)
      .addScaledVector(_fwd, my * speed)
      .addScaledVector(_right, mx * speed);
    _targetVel.y += vy * speed;

    velocity.lerp(_targetVel, smooth);
    rig.position.addScaledVector(velocity, dt);
    applyFlatEyeHeight();
  }

  // node flare decay + spawn/despawn animation
  for (const n of nodeData) {
    if (n.flare > 0) n.flare = Math.max(0, n.flare - dt * 1.6);
    if (n.dying) {
      n.dieT += dt;
      n.spawnT = Math.max(0, 1 - n.dieT / 1.5);
      if (n.dieT >= 1.5) {
        n.alive = false; n.dying = false;
        buildEdges();
        setTimeout(() => { reviveSlot(n); }, 3000 + Math.random() * 1500);
      }
    } else if (n.spawnT < 1) {
      n.spawnT = Math.min(1, n.spawnT + dt * 0.8);
      if (n.spawnT >= 1 && !n._edgesBuilt) { n._edgesBuilt = true; buildEdges(); }
    }
    if (n.alive && n.spawnT < 1 && n.dieT === 0) n._edgesBuilt = false;
  }

  // LOD: tag far nodes so refreshInstances() hides their sphere and only
  // the point-sprite stand-in (below) renders for them
  let farCount = 0;
  const camPos = rig.position;
  for (const n of nodeData) {
    if (!n.alive) { n.isFar = false; continue; }
    const d = camPos.distanceTo(n.pos);
    n.isFar = d > LOD_DIST;
    if (n.isFar) {
      farPositions[farCount*3] = n.pos.x; farPositions[farCount*3+1] = n.pos.y; farPositions[farCount*3+2] = n.pos.z;
      const farMult = Math.min(0.9, n.intensity * 0.4);
      farColors[farCount*3] = n.baseColor.r * farMult;
      farColors[farCount*3+1] = n.baseColor.g * farMult;
      farColors[farCount*3+2] = n.baseColor.b * farMult;
      farCount++;
    }
  }
  farGeo.setDrawRange(0, farCount);
  farGeo.attributes.position.needsUpdate = true;
  farGeo.attributes.color.needsUpdate = true;

  refreshInstances();

  // pulses
  let pulseInstanceCount = 0;
  for (const p of pulses) {
    if (!p.active) continue;
    p.t += dt * p.speed;
    if (p.t >= 1) { p.active = false; continue; }
    const a = nodeData[p.from].pos, b = nodeData[p.to].pos;
    _pv.lerpVectors(a, b, p.t);
    tmpObj.position.copy(_pv);
    const s = p.replay ? 0.16 : 0.24;
    tmpObj.scale.setScalar(s);
    tmpObj.rotation.set(0,0,0);
    tmpObj.updateMatrix();
    pulseMesh.setMatrixAt(pulseInstanceCount, tmpObj.matrix);
    pulseMesh.setColorAt(pulseInstanceCount, p.color);
    pulseInstanceCount++;
  }
  for (let i = pulseInstanceCount; i < MAX_PULSES; i++) {
    tmpObj.position.set(0, -9999, 0);
    tmpObj.scale.setScalar(0.0001);
    tmpObj.updateMatrix();
    pulseMesh.setMatrixAt(i, tmpObj.matrix);
  }
  pulseMesh.instanceMatrix.needsUpdate = true;
  if (pulseMesh.instanceColor) pulseMesh.instanceColor.needsUpdate = true;

  // throttled hover raycast — desktop-only (mouseNDC stays off-screen on
  // touch), cheap against ~200 instances but no need to run every frame
  if (time - lastHoverCheck > 90) {
    lastHoverCheck = time;
    raycaster.setFromCamera(mouseNDC, camera);
    const hit = raycaster.intersectObject(nodeMesh)[0];
    const idx = (hit && hit.instanceId != null && nodeData[hit.instanceId] && nodeData[hit.instanceId].alive) ? hit.instanceId : -1;
    if (idx !== hoveredNodeIndex) {
      hoveredNodeIndex = idx;
      if (idx >= 0) updateNodeInfo(nodeData[idx]);
    }
  }

  // Fix 1/2: labels — top-K + hover/select pool (recomputed periodically),
  // repositioned/rescaled/faded every frame, screen-space overlap resolved
  // in priority order, tethered to their node with a leader line.
  updateVisibleLabels(time);
  const screenW = canvas.clientWidth || window.innerWidth;
  const screenH = canvas.clientHeight || window.innerHeight;
  _labelRight.setFromMatrixColumn(camera.matrixWorld, 0).normalize();
  _labelUp.setFromMatrixColumn(camera.matrixWorld, 1).normalize();
  let placedCount = 0;
  let leaderVerts = 0;
  for (let i = 0; i < labelPool.length; i++) {
    const entry = labelPool[i];
    const n = entry.nodeIndex >= 0 ? nodeData[entry.nodeIndex] : null;
    if (!n || !n.alive) { entry.sprite.visible = false; continue; }
    const dist = camPos.distanceTo(n.pos);
    // scale up with distance (counteracts perspective shrink) so it stays
    // legible from across the mesh, clamped so it doesn't balloon or vanish
    const distMul = Math.min(2.2, Math.max(0.85, dist / 24));
    const distOpacity = smoothstep01(2, 6, dist) * (1 - smoothstep01(85, 120, dist));
    if (distOpacity <= 0.01) { entry.sprite.visible = false; continue; }

    _labelOffset.set(0, 1.25 * n.scale + 0.5, 0);
    _labelCenter.copy(n.pos).add(_labelOffset);
    _projB.copy(_labelCenter).project(camera);
    if (_projB.z > 1) { entry.sprite.visible = false; continue; } // behind camera

    const box = _screenPos[i];
    box.x = (_projB.x * 0.5 + 0.5) * screenW;
    box.y = (1 - (_projB.y * 0.5 + 0.5)) * screenH;
    box.halfW = screenHalfExtent(_projB.x, _projB.y, _labelRight, entry.baseW * distMul * 0.5, screenW, screenH);
    box.halfH = screenHalfExtent(_projB.x, _projB.y, _labelUp, entry.baseH * distMul * 0.5, screenW, screenH);

    // overlap resolution: labelPool is already priority-ordered (hover/select
    // first, then descending vol24h) — hide this one if it collides with a
    // higher-priority label already placed this frame; it reappears on its
    // own once the camera moves enough to clear the overlap
    let hidden = false;
    for (let j = 0; j < placedCount; j++) {
      if (boxesOverlap(box, _screenPos[_placedIdx[j]])) { hidden = true; break; }
    }
    if (hidden) { entry.sprite.visible = false; continue; }
    _placedIdx[placedCount++] = i;

    entry.sprite.visible = true;
    entry.sprite.material.opacity = distOpacity;
    entry.sprite.scale.set(entry.baseW * distMul, entry.baseH * distMul, 1);
    entry.sprite.position.copy(_labelCenter);

    // leader line: node centre -> label anchor, node colour, low opacity
    leaderPositions[leaderVerts*6+0] = n.pos.x; leaderPositions[leaderVerts*6+1] = n.pos.y; leaderPositions[leaderVerts*6+2] = n.pos.z;
    leaderPositions[leaderVerts*6+3] = _labelCenter.x; leaderPositions[leaderVerts*6+4] = _labelCenter.y; leaderPositions[leaderVerts*6+5] = _labelCenter.z;
    leaderColors[leaderVerts*6+0] = n.baseColor.r; leaderColors[leaderVerts*6+1] = n.baseColor.g; leaderColors[leaderVerts*6+2] = n.baseColor.b;
    leaderColors[leaderVerts*6+3] = n.baseColor.r; leaderColors[leaderVerts*6+4] = n.baseColor.g; leaderColors[leaderVerts*6+5] = n.baseColor.b;
    leaderVerts++;
  }
  leaderGeo.setDrawRange(0, leaderVerts * 2);
  leaderGeo.attributes.position.needsUpdate = true;
  leaderGeo.attributes.color.needsUpdate = true;

  edgeRebuildAccum += dt;

  if (renderer.xr.isPresenting) {
    renderer.render(scene, camera);
  } else {
    composer.render();
  }
});

initNodes();
setInterval(erlangBeat, ERLANG_INTERVAL);
window.__wm = { scene, camera, renderer, nodeMesh, nodeData, rig, composer, edgeLines, THREE, source, dataMode, pulses, flareNodeReplay, onDataEvent, labelPool, leaderGeo, mouseNDC, get hoveredNodeIndex() { return hoveredNodeIndex; }, get selectedNodeIndex() { return selectedNodeIndex; }, get dragging() { return dragging; }, get pointerLocked() { return pointerLocked; } };
</script>
</body>
</html>
